spring:
  application:
    name: openagent
  config:
    import: optional:classpath:application-local.yaml
  autoconfigure:
    exclude:
      - dev.langchain4j.openai.spring.AutoConfig
server:
  port: 8080

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

openagent:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  ai:
    chat:
      base-url: ${OPENAGENT_CHAT_BASE_URL:}
      api-key: ${OPENAGENT_CHAT_API_KEY:}
      model-name: ${OPENAGENT_CHAT_MODEL_NAME:}
      temperature: ${OPENAGENT_CHAT_TEMPERATURE:0.2}
      timeout: ${OPENAGENT_CHAT_TIMEOUT:PT2M}
      log-requests: ${OPENAGENT_CHAT_LOG_REQUESTS:false}
      log-responses: ${OPENAGENT_CHAT_LOG_RESPONSES:false}
    embedding:
      base-url: ${OPENAGENT_EMBEDDING_BASE_URL:}
      api-key: ${OPENAGENT_EMBEDDING_API_KEY:}
      model-name: ${OPENAGENT_EMBEDDING_MODEL_NAME:}
      dimension: ${OPENAGENT_EMBEDDING_DIMENSION:1024}
      timeout: ${OPENAGENT_EMBEDDING_TIMEOUT:PT2M}
      log-requests: ${OPENAGENT_EMBEDDING_LOG_REQUESTS:false}
      log-responses: ${OPENAGENT_EMBEDDING_LOG_RESPONSES:false}
  chat:
    session-retention: PT10M
  storage:
    type: ${OPENAGENT_STORAGE_TYPE:LOCAL}
    local:
      base-dir: ${OPENAGENT_STORAGE_LOCAL_BASE_DIR:}

milvus:
  database: ${MILVUS_DATABASE:openagent}
  collection: ${MILVUS_COLLECTION:knowledge_segment}
  partition-prefix: ${MILVUS_PARTITION_PREFIX:kb_}
  connect-timeout-ms: ${MILVUS_CONNECT_TIMEOUT_MS:10000}
  metric-type: ${MILVUS_METRIC_TYPE:COSINE}
