spring:
  application:
    name: openagent
  config:
    import: optional:classpath:application-local.yaml
  autoconfigure:
    exclude:
      - dev.langchain4j.openai.spring.AutoConfig
server:
  port: 8080

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

openagent:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  ai:
    http-client-factory: ${OPENAGENT_AI_HTTP_CLIENT_FACTORY:JDK}
    chat:
      base-url: ${OPENAGENT_CHAT_BASE_URL:}
      api-key: ${OPENAGENT_CHAT_API_KEY:}
      model-name: ${OPENAGENT_CHAT_MODEL_NAME:}
      tokenizer-model-name: ${OPENAGENT_CHAT_TOKENIZER_MODEL_NAME:}
      temperature: ${OPENAGENT_CHAT_TEMPERATURE:0.2}
      timeout: ${OPENAGENT_CHAT_TIMEOUT:PT2M}
      log-requests: ${OPENAGENT_CHAT_LOG_REQUESTS:false}
      log-responses: ${OPENAGENT_CHAT_LOG_RESPONSES:false}
    embedding:
      base-url: ${OPENAGENT_EMBEDDING_BASE_URL:}
      api-key: ${OPENAGENT_EMBEDDING_API_KEY:}
      model-name: ${OPENAGENT_EMBEDDING_MODEL_NAME:}
      dimension: ${OPENAGENT_EMBEDDING_DIMENSION:1024}
      timeout: ${OPENAGENT_EMBEDDING_TIMEOUT:PT2M}
      log-requests: ${OPENAGENT_EMBEDDING_LOG_REQUESTS:false}
      log-responses: ${OPENAGENT_EMBEDDING_LOG_RESPONSES:false}
    memory:
      default-enabled: ${OPENAGENT_MEMORY_DEFAULT_ENABLED:true}
      max-messages: ${OPENAGENT_MEMORY_MAX_MESSAGES:20}
      max-tokens: ${OPENAGENT_MEMORY_MAX_TOKENS:4000}
      always-keep-system-message-first: ${OPENAGENT_MEMORY_ALWAYS_KEEP_SYSTEM_MESSAGE_FIRST:true}
  chat:
    session-retention: PT10M
  storage:
    type: ${OPENAGENT_STORAGE_TYPE:LOCAL}
    local:
      base-dir: ${OPENAGENT_STORAGE_LOCAL_BASE_DIR:}
  mcp:
    client-name: ${OPENAGENT_MCP_CLIENT_NAME:openagent}
    client-version: ${OPENAGENT_MCP_CLIENT_VERSION:0.0.1}
    protocol-version: ${OPENAGENT_MCP_PROTOCOL_VERSION:2024-11-05}
    initialization-timeout: ${OPENAGENT_MCP_INITIALIZATION_TIMEOUT:PT30S}
    tool-execution-timeout: ${OPENAGENT_MCP_TOOL_EXECUTION_TIMEOUT:PT60S}
    resources-timeout: ${OPENAGENT_MCP_RESOURCES_TIMEOUT:PT60S}
    prompts-timeout: ${OPENAGENT_MCP_PROMPTS_TIMEOUT:PT60S}
    ping-timeout: ${OPENAGENT_MCP_PING_TIMEOUT:PT10S}
    reconnect-interval: ${OPENAGENT_MCP_RECONNECT_INTERVAL:PT5S}
    http-timeout: ${OPENAGENT_MCP_HTTP_TIMEOUT:PT20S}
    log-events: ${OPENAGENT_MCP_LOG_EVENTS:false}
    log-requests: ${OPENAGENT_MCP_LOG_REQUESTS:false}
    log-responses: ${OPENAGENT_MCP_LOG_RESPONSES:false}
    subsidiary-channel: ${OPENAGENT_MCP_SUBSIDIARY_CHANNEL:false}

milvus:
  database: ${MILVUS_DATABASE:openagent}
  collection: ${MILVUS_COLLECTION:knowledge_segment}
  partition-prefix: ${MILVUS_PARTITION_PREFIX:kb_}
  connect-timeout-ms: ${MILVUS_CONNECT_TIMEOUT_MS:10000}
  metric-type: ${MILVUS_METRIC_TYPE:COSINE}
